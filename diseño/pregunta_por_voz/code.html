<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pregunta por Voz - MuseIQ</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#9b6b00",
                    "surface-dim": "#d6dade",
                    "surface-container-low": "#f0f4f8",
                    "background": "#f6fafe",
                    "tertiary-fixed-dim": "#ffba38",
                    "on-background": "#171c1f",
                    "outline": "#707785",
                    "tertiary-fixed": "#ffdeac",
                    "surface-container": "#eaeef2",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed-variant": "#604100",
                    "primary-fixed-dim": "#a3c9ff",
                    "primary-fixed": "#d3e3ff",
                    "surface-container-highest": "#dfe3e7",
                    "on-surface-variant": "#404753",
                    "on-tertiary-fixed": "#281900",
                    "tertiary": "#7b5500",
                    "surface-container-high": "#e4e9ed",
                    "inverse-primary": "#a3c9ff",
                    "secondary-container": "#bae6f9",
                    "on-primary-fixed-variant": "#004883",
                    "on-error-container": "#93000a",
                    "outline-variant": "#c0c7d5",
                    "inverse-surface": "#2c3134",
                    "on-secondary": "#ffffff",
                    "on-error": "#ffffff",
                    "primary": "#005da7",
                    "on-primary-fixed": "#001c39",
                    "surface-variant": "#dfe3e7",
                    "on-tertiary-container": "#fffbff",
                    "surface-bright": "#f6fafe",
                    "secondary": "#396474",
                    "secondary-fixed-dim": "#a1cddf",
                    "secondary-fixed": "#bde9fc",
                    "surface-tint": "#0060ab",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#fdfcff",
                    "on-secondary-fixed-variant": "#1f4c5b",
                    "on-secondary-container": "#3d6878",
                    "surface": "#f6fafe",
                    "surface-container-lowest": "#ffffff",
                    "error": "#ba1a1a",
                    "primary-container": "#0076d1",
                    "inverse-on-surface": "#edf1f5",
                    "on-secondary-fixed": "#001f28",
                    "on-surface": "#171c1f"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(246, 250, 254, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .mic-pulse {
            box-shadow: 0 0 0 0 rgba(0, 93, 167, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 93, 167, 0.4); }
            70% { box-shadow: 0 0 0 25px rgba(0, 93, 167, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 93, 167, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-4">
<!-- Modal Background Wrapper -->
<div class="fixed inset-0 bg-on-surface/20 backdrop-blur-sm z-0"></div>
<!-- Main PreguntaVoz Modal -->
<main class="relative z-10 w-full max-w-lg glass-panel rounded-[2rem] overflow-hidden shadow-2xl border border-white/20">
<!-- Top Section: Editorial Header -->
<div class="px-8 pt-10 pb-6 text-center">
<h1 class="font-headline text-3xl font-extrabold text-primary tracking-tight mb-2">Pregunta sobre esta obra</h1>
<p class="text-secondary font-medium opacity-80">Habla cuando estés listo</p>
</div>
<!-- Center Section: Active Interaction -->
<div class="flex flex-col items-center px-8 py-4">
<!-- Animated Mic Button -->
<div class="relative mb-8">
<div class="absolute inset-0 bg-primary/10 rounded-full animate-ping scale-150 opacity-20"></div>
<button class="relative w-24 h-24 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform mic-pulse">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
<p class="font-headline font-bold text-lg text-primary-container mb-1 animate-pulse">Escuchando...</p>
<!-- Live Transcription Area -->
<div class="w-full bg-surface-container-low rounded-2xl p-6 text-center min-h-[80px] flex items-center justify-center">
<p class="text-xl font-medium text-on-surface italic opacity-90">"¿Quién pintó esta obra?"</p>
</div>
</div>
<!-- Middle Section: Intelligence Context -->
<div class="px-8 py-6 space-y-6">
<!-- Quick Suggestion Chips -->
<div class="flex flex-wrap gap-2 justify-center">
<button class="bg-surface-container-highest/50 hover:bg-primary/10 text-on-surface-variant px-4 py-2 rounded-full text-sm font-semibold transition-colors border border-transparent hover:border-primary/20">
                    ¿Quién la hizo?
                </button>
<button class="bg-surface-container-highest/50 hover:bg-primary/10 text-on-surface-variant px-4 py-2 rounded-full text-sm font-semibold transition-colors border border-transparent hover:border-primary/20">
                    ¿Qué significa?
                </button>
<button class="bg-surface-container-highest/50 hover:bg-primary/10 text-on-surface-variant px-4 py-2 rounded-full text-sm font-semibold transition-colors border border-transparent hover:border-primary/20">
                    Explícamelo más simple
                </button>
</div>
<!-- Response Area (Appears after query) -->
<div class="bg-white/60 rounded-3xl p-6 shadow-sm border border-primary/5 flex flex-col gap-4">
<div class="flex items-start gap-4">
<div class="w-10 h-10 rounded-xl bg-secondary flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-secondary text-xl">auto_awesome</span>
</div>
<div class="flex-1">
<p class="text-on-surface leading-relaxed text-sm md:text-base">
                            Esta obra fue creada por <span class="font-bold text-primary">Francisco de Goya</span> durante su etapa de madurez, reflejando el realismo psicológico característico de sus retratos reales.
                        </p>
</div>
</div>
<button class="self-end flex items-center gap-2 bg-secondary-container text-on-secondary-container px-4 py-2 rounded-xl text-sm font-bold hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                    Reproducir Audio
                </button>
</div>
</div>
<!-- Footer Actions -->
<div class="px-8 pb-10 flex flex-col gap-3">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-2xl shadow-md hover:shadow-lg transition-all active:scale-[0.98]">
                Hacer otra pregunta
            </button>
<button class="w-full text-secondary font-bold py-3 hover:bg-surface-container-high rounded-xl transition-colors">
                Cerrar
            </button>
</div>
</main>
<!-- Background Decorative Element (Asymmetric) -->
<div class="fixed top-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
