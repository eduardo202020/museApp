<!DOCTYPE html>

            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);

        }

<body class="bg-surface font-body text-on-surface min-h-screen pb-28">
<!-- TopAppBar -->
<header class="bg-slate-50 dark:bg-slate-900 sticky top-0 z-40">
<div class="flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-blue-600 dark:text-blue-400">menu</span>
</button>
<div class="flex flex-col">
<span class="font-['Manrope'] font-extrabold text-blue-700 dark:text-blue-300 tracking-tight text-xl">MuseIQ</span>
</div>
</div>
<div class="flex items-center gap-2 bg-primary-fixed text-on-primary-fixed-variant px-3 py-1 rounded-full text-xs font-bold tracking-tight">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span>Sala 3 - Conectado</span>
</div>
</div>
<div class="bg-slate-100 dark:bg-slate-800 h-px"></div>

<div class="space-y-1">

<div class="flex items-baseline gap-2">
<h2 class="font-headline text-2xl font-bold tracking-tight">Sala Actual: Sala 3</h2>
<div class="h-px flex-grow bg-outline-variant opacity-20"></div>
</div>
<p class="text-secondary font-medium text-sm">Zona: Cerca de la entrada</p>
</div>
<!-- Main Card: Obra Suggestion -->

<div class="bg-surface-container-lowest rounded-[2rem] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.08)] transition-transform duration-500 hover:scale-[1.02]">
<div class="aspect-[4/5] relative overflow-hidden">
<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" data-alt="high-quality close-up of an ancient Mochica portrait vessel with dramatic museum lighting and earthy clay textures" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDiehjQM8HAXvy_SfxdojkADhbtO7oUVILClWI5vURdsccx7rHcUUNCTsEiKN1eMU1GArrrVRdlklMmvKLxu1mjjMMCV8_4yEpqBdIPAEeBXofevvvGNDwaeUSKAuv0Sl9Bo7h92LqM_J6gHmR9UEGeoktImJ0qPnBakTAtiwbrntx8lp1ziGV6UTZtDId8Np0D8ZkNQjztE1oHXdWdmO3W5YIcPPPgEy7xBn9Y01NY3TsDdpMIkTozNXe5nenZ0L4fKCH_lzuXJyU"/>
<div class="absolute inset-0 bg-gradient-to-t from-on-surface/60 via-transparent to-transparent"></div>
<!-- Context Overlay -->
<div class="absolute bottom-0 left-0 right-0 p-8 text-white">
<span class="inline-block px-3 py-1 glass-panel rounded-full text-[11px] font-bold tracking-wider uppercase mb-3 text-primary">Inteligencia de proximidad</span>
<p class="text-white/80 text-sm font-medium mb-1 italic">Probablemente estás frente a esta obra</p>
<h3 class="font-headline text-3xl font-extrabold leading-tight tracking-tight">Huaco Retrato Mochica</h3>
</div>
</div>
<div class="p-8 space-y-6">
<div class="flex flex-col gap-3">
<button class="signature-gradient w-full py-5 rounded-2xl flex items-center justify-center gap-3 text-white font-bold text-lg active:scale-95 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                            Escuchar
                        </button>
<div class="grid grid-cols-2 gap-3">
<button class="bg-surface-container-high text-on-surface-variant font-semibold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[20px]">info</span>
                                Ver detalle
                            </button>
<button class="bg-surface-container-high text-on-surface-variant font-semibold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[20px]">replay</span>
                                Repetir
                            </button>
</div>
</div>
</div>
</div>

<div class="flex items-center gap-3 font-label text-sm tracking-[0.2em] font-semibold text-secondary">
<span class="opacity-30">02</span>
<span class="w-8 h-px bg-outline-variant opacity-20"></span>
<span class="text-primary font-bold bg-primary-fixed px-3 py-1 rounded-lg">03 ACTUAL</span>

<span class="opacity-30">04</span>
</div>
<div class="flex gap-1.5">
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant opacity-30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant opacity-30"></div>
<div class="w-6 h-1.5 rounded-full bg-primary"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant opacity-30"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant opacity-30"></div>
</div>
</div>

<span class="absolute inset-0 rounded-full bg-primary-container animate-ping opacity-20 group-hover:animate-none"></span>
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">mic</span>
<!-- Label Tooltip-ish -->
<span class="absolute right-20 bg-on-surface text-surface text-[11px] font-bold px-3 py-1.5 rounded-lg whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity">Preguntar por voz</span>
</button>

<span class="material-symbols-outlined text-blue-600 dark:text-blue-400" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Manrope'] text-[11px] font-semibold tracking-wide uppercase">Recorrido</span>
</a>
<!-- Tab: Obras -->

<span class="material-symbols-outlined">museum</span>
<span class="font-['Manrope'] text-[11px] font-semibold tracking-wide uppercase">Obras</span>
</a>
<!-- Tab: Mi Visita -->
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-500 transition-all" href="#">
<span class="material-symbols-outlined">account_circle</span>
<span class="font-['Manrope'] text-[11px] font-semibold tracking-wide uppercase">Mi Visita</span>
</a>
</nav>

<span class="material-symbols-outlined">settings</span>

<button class="w-full flex items-center gap-4 py-4 px-4 font-['Manrope'] text-base font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors">
<span class="material-symbols-outlined">help</span>

</nav>
</aside>
